<div class="hero is-fullheight is-light">
  <div class="hero-body">
    <div class="container">
      <div class="columns is-centered">
        <div class="column is-4">
          <div class="box">
            <div class="has-text-centered mb-5">
              <h1 class="subtitle is-2">Verify Identity</h1>
              <p class="subtitle is-5">Enter the 6-digit code sent to your email</p>
            </div>

            <form [formGroup]="verifyForm" (ngSubmit)="onSubmit()">
              <div class="field">
                <div class="control has-floating-label">
                  <input
                    class="input is-medium with-floating-label"
                    id="pin"
                    placeholder=" "
                    type="text"
                    inputmode="numeric"
                    maxlength="6"
                    required
                    formControlName="pin">
                  <label class="label is-floating-label" for="pin">Verification Code</label>
                </div>
                @if (pin?.invalid && pin?.touched) {
                  <p class="help is-danger">
                    @if (pin?.errors?.['required']) {
                      <span>Verification code is required</span>
                    } @else if (pin?.errors?.['pattern']) {
                      <span>Please enter a valid 6-digit code</span>
                    }
                  </p>
                }
              </div>

              <div class="field">
                <div class="control">
                  <button
                    class="button is-dark-grey is-fullwidth is-medium"
                    type="submit"
                    [disabled]="isSubmitDisabled()"
                    [class.is-loading]="isLoading">
                    <span>Verify</span>
                  </button>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
